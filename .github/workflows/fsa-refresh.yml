name: Daily FSA dataset refresh

# Refreshes the base FSA venue dataset and uploads it to Supabase Storage, so
# the app picks up new/updated restaurants without a redeploy. The enrichment
# cache lives in the uploaded blob, so each run only re-enriches new/stale venues.

on:
  schedule:
    # :17 rather than the exact hour — GitHub explicitly warns that round-hour
    # crons (":00") are the most oversubscribed slot and are the first to be
    # delayed or dropped under load; the old weekly Monday run went silently
    # missing on its first scheduled run (2026-07-06) with no failed run to
    # even show for it, so nudging off the busiest minute is a real
    # reliability fix, not just cosmetic.
    - cron: "17 4 * * *" # daily ~04:17 UTC
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Refresh FSA dataset → Supabase Storage
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DATASET_BUCKET: datasets
        run: node scripts/fetch-fsa.mjs
